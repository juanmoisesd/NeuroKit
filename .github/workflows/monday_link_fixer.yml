name: 🛠️ Monday Link Fixer

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  link_fixer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies 🏭
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Link Fixer 🛠️
        id: link_fixer
        run: |
          python scripts/link_fixer.py > report.txt
          cat report.txt

      - name: Create Pull Request 📥
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: automatic fix for broken links"
          title: "🛠️ [Link Fixer] Automatic link updates and report"
          body-path: report.txt
          branch: link-fixer-updates
          delete-branch: true
          labels: documentation, automated-pr
